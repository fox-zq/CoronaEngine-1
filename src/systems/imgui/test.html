<!DOCTYPE html>
<html>
<head>
    <title>Python Print Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Python Print Test</h1>

    <button onclick="testPythonPrint()">Test No func Print</button>
    <button onclick="testConsoleLog()">Test Add Log</button>
    <button onclick="testMultipleArgs()">Test Greet Arguments</button>
    <button onclick="testFromConsole()">Test from Browser Console</button>

    <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0;">
        <h3>Instructions:</h3>
        <p>1. Click buttons to test Python integration</p>
        <p>2. Open browser console (F12) and try:</p>
        <pre>python.print("Hello from console!")</pre>
        <pre>console.log("This goes to Python too!")</pre>
    </div>

    <script>
        function testPythonPrint() {
            window.cefQuery({request: 'getVersion',
                     persistent: false,
                     onSuccess: function(response) { console.log(response); },
                     onFailure: function(error_code, error_message) {} });
        }

        function testConsoleLog() {
                window.cefQuery({request: 'greet',
                     persistent: false,
                     onSuccess: function(response) { console.log(response); },
                     onFailure: function(error_code, error_message) {} });
        }

        function testMultipleArgs() {
                window.cefQuery({request: 'add',
                     persistent: false,
                     onSuccess: function(response) { console.log(response); },
                     onFailure: function(error_code, error_message) {} });
        }

        function testFromConsole() {
                       window.cefQuery({request: 'open',
                     persistent: false,
                     onSuccess: function(response) { console.log(response); },
                     onFailure: function(error_code, error_message) {} });
        }

        // 页面加载完成后自动测试
        window.onload = function() {
        console.log("This goes to Python too!")
        };
    </script>
</body>
</html>
